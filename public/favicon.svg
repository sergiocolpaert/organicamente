<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo Circular Verde Suave -->
  <circle cx="256" cy="256" r="236" fill="#e9f5ed" />
  
  <defs>
    <!-- Gradiente premium com as cores do Design System -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#52b788" />
      <stop offset="100%" stop-color="#1b4332" />
    </linearGradient>
  </defs>

  <!-- Desenho da Folha Principal (Estilo Agroecológico) -->
  <path d="M256,110 C330,110 380,180 380,256 C380,332 330,402 256,402 C182,402 132,332 132,256 C132,180 182,110 256,110 Z" fill="url(#leafGrad)" />
  
  <!-- Linha interna da folha (Nervura principal branca) -->
  <path d="M256,110 Q256,256 256,402" stroke="#ffffff" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.3" />
  
  <!-- Folha secundária (Brotinho lateral) -->
  <path d="M256,220 C320,180 360,220 340,280 C320,340 270,300 256,280" fill="#74c69d" opacity="0.95" />
</svg>
